<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Setup Buddy</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #0f172a;
  --text2: #475569; --text3: #94a3b8; --accent: #2563eb; --accent-light: #dbeafe;
  --blue-cold: #E6F1FB; --blue-text: #0C447C; --blue-label: #185FA5;
  --amber-hot: #FAEEDA; --amber-text: #633806; --amber-label: #854F0B;
  --green: #16a34a; --green-bg: #dcfce7; --red: #dc2626; --red-bg: #fef2f2;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f1f5f9; color: var(--text); -webkit-tap-highlight-color: transparent; }
.app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--bg); }

/* Header */
.header { padding: 16px 20px 12px; background: #0f172a; color: white; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 700; }
.header-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }

/* Navigation */
.nav { display: flex; background: #0f172a; padding: 0 16px 12px; gap: 6px; position: sticky; top: 52px; z-index: 100; }
.nav-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.08); color: #94a3b8; font-family: inherit; }
.nav-btn.active { background: var(--accent); color: white; }

/* Screens */
.screen { display: none; padding: 16px 20px 100px; }
.screen.active { display: block; }

/* Session bar */
.session-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.session-pill { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer; background: white; color: var(--text2); transition: all 0.15s; }
.session-pill.active, .session-pill:active { background: var(--accent); color: white; border-color: var(--accent); }
select.session-pill { appearance: none; padding-right: 10px; }

/* Form elements */
.field-row { display: flex; gap: 10px; margin-bottom: 10px; }
.field { flex: 1; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; }
.field-full { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
.field .val { font-size: 20px; font-weight: 600; }
.field .unit { font-size: 12px; color: var(--text3); margin-left: 4px; }
.field input { width: 100%; border: none; font-size: 20px; font-weight: 600; font-family: inherit; color: var(--text); background: transparent; outline: none; }
.field input::placeholder { color: var(--text3); font-weight: 400; }
.field-full label { font-size: 13px; color: var(--text2); font-weight: 500; }
.field-full input { border: none; font-size: 18px; font-weight: 600; text-align: right; width: 120px; font-family: inherit; color: var(--text); background: transparent; outline: none; }

/* Tire pressure box */
.pressure-box { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 12px; margin-bottom: 10px; }
.pressure-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.pressure-header span { font-size: 14px; font-weight: 600; }
.pressure-header .unit-label { font-size: 12px; color: var(--text3); font-weight: 500; }
.pressure-grid { display: grid; grid-template-columns: 1fr 16px 1fr; gap: 8px; align-items: center; }
.pressure-corner { display: flex; gap: 5px; position: relative; }
.corner-label { position: absolute; font-size: 12px; font-weight: 600; color: var(--text); z-index: 1; }
.corner-label.tl { top: 3px; left: 6px; }
.corner-label.tr { top: 3px; right: 6px; }
.corner-label.bl { bottom: 3px; left: 6px; }
.corner-label.br { bottom: 3px; right: 6px; }
.p-cell { flex: 1; border-radius: 8px; padding: 18px 4px 8px; text-align: center; }
.p-cell.cold { background: var(--blue-cold); }
.p-cell.hot { background: var(--amber-hot); }
.p-cell .p-label { font-size: 11px; margin-bottom: 2px; }
.p-cell.cold .p-label { color: var(--blue-label); }
.p-cell.hot .p-label { color: var(--amber-label); }
.p-cell input { width: 100%; border: none; font-size: 20px; font-weight: 600; text-align: center; background: transparent; outline: none; font-family: inherit; }
.p-cell.cold input { color: var(--blue-text); }
.p-cell.hot input { color: var(--amber-text); }
.pressure-spacer { height: 10px; }

/* Buttons */
.btn-primary { width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; background: var(--accent); color: white; transition: all 0.15s; }
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }
.btn-secondary { width: 100%; padding: 12px; font-size: 14px; font-weight: 500; border-radius: 10px; border: 1.5px solid var(--border); cursor: pointer; font-family: inherit; background: var(--card); color: var(--text2); margin-bottom: 10px; }
.btn-danger { background: var(--red-bg); color: var(--red); border-color: var(--red-bg); }

/* Tire set cards */
.tire-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.tire-card.selected { border-color: var(--accent); background: var(--accent-light); }
.tire-info h3 { font-size: 15px; font-weight: 600; }
.tire-info p { font-size: 12px; color: var(--text2); margin-top: 2px; }
.tire-laps { text-align: right; }
.tire-laps .num { font-size: 22px; font-weight: 700; }
.tire-laps .label { font-size: 11px; color: var(--text3); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge.new { background: var(--green-bg); color: var(--green); }
.badge.good { background: var(--accent-light); color: var(--accent); }
.badge.past { background: #fef3c7; color: #92400e; }
.badge.done { background: var(--red-bg); color: var(--red); }

/* Notes */
.notes-field { width: 100%; min-height: 80px; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; font-family: inherit; font-size: 14px; resize: vertical; outline: none; margin-bottom: 10px; }
.notes-field:focus { border-color: var(--accent); }

/* Advanced toggle */
.advanced-toggle { text-align: center; padding: 12px; color: var(--text3); font-size: 13px; cursor: pointer; margin-bottom: 10px; }
.advanced-section { display: none; }
.advanced-section.open { display: block; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Section label */
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin: 20px 0 10px; }

/* Stint history */
.stint-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; }
.stint-card:active { background: #f8fafc; }
.stint-card h3 { font-size: 14px; font-weight: 600; }
.stint-card p { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty h3 { font-size: 16px; color: var(--text2); margin-bottom: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Setup Buddy</h1>
    <div class="header-sub" id="headerSub">Loading...</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showScreen('setup')">Setup</button>
    <button class="nav-btn" onclick="showScreen('tires')">Tires</button>
    <button class="nav-btn" onclick="showScreen('history')">History</button>
  </div>

  <!-- SETUP SCREEN -->
  <div class="screen active" id="screen-setup">
    <div class="session-bar">
      <div class="session-pill active" id="pillTrack">Mid-State IL</div>
      <select class="session-pill" id="sessionType" onchange="updateSessionType()">
        <option>Practice</option><option>Qualifying</option><option>Pre-Final</option><option>Final</option>
      </select>
      <select class="session-pill" id="trackCondition">
        <option>Green</option><option>Dusty</option><option selected>Normal</option><option>Rubbered</option><option>Grippy</option>
      </select>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-size:15px;font-weight:600;">Stint <span id="stintNum">1</span></span>
      <button onclick="incrementStint()" style="padding:6px 16px;border-radius:8px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Next stint +</button>
    </div>

    <!-- Front track width -->
    <div class="field-full">
      <label>Front track width</label>
      <div><input type="number" id="frontTrack" placeholder="1040" style="width:80px;font-size:18px;"> <span style="font-size:12px;color:var(--text3);">mm</span></div>
    </div>

    <!-- Tire pressures -->
    <div class="pressure-box">
      <div class="pressure-header">
        <span>Tire pressures</span>
        <span class="unit-label">PSI</span>
      </div>
      <!-- Front row -->
      <div class="pressure-grid" style="margin-bottom:10px;">
        <div class="pressure-corner">
          <span class="corner-label tl">FL</span>
          <div class="p-cell cold"><div class="p-label">cold</div><input type="number" step="0.1" id="cp_fl" placeholder="8.5"></div>
          <div class="p-cell hot"><div class="p-label">hot</div><input type="number" step="0.1" id="hp_fl" placeholder="—"></div>
        </div>
        <div></div>
        <div class="pressure-corner">
          <span class="corner-label tr">FR</span>
          <div class="p-cell cold"><div class="p-label">cold</div><input type="number" step="0.1" id="cp_fr" placeholder="8.5"></div>
          <div class="p-cell hot"><div class="p-label">hot</div><input type="number" step="0.1" id="hp_fr" placeholder="—"></div>
        </div>
      </div>
      <!-- Rear row -->
      <div class="pressure-grid">
        <div class="pressure-corner">
          <span class="corner-label bl">RL</span>
          <div class="p-cell cold"><div class="p-label">cold</div><input type="number" step="0.1" id="cp_rl" placeholder="9.0"></div>
          <div class="p-cell hot"><div class="p-label">hot</div><input type="number" step="0.1" id="hp_rl" placeholder="—"></div>
        </div>
        <div></div>
        <div class="pressure-corner">
          <span class="corner-label br">RR</span>
          <div class="p-cell cold"><div class="p-label">cold</div><input type="number" step="0.1" id="cp_rr" placeholder="9.0"></div>
          <div class="p-cell hot"><div class="p-label">hot</div><input type="number" step="0.1" id="hp_rr" placeholder="—"></div>
        </div>
      </div>
    </div>

    <!-- Rear track width -->
    <div class="field-full">
      <label>Rear track width</label>
      <div><input type="number" id="rearTrack" placeholder="1395" style="width:80px;font-size:18px;"> <span style="font-size:12px;color:var(--text3);">mm</span></div>
    </div>

    <!-- Tire set + Sprocket -->
    <div class="field-row">
      <div class="field">
        <label>Tire set</label>
        <select id="tireSetSelect" style="width:100%;border:none;font-size:16px;font-weight:600;font-family:inherit;color:var(--text);background:transparent;outline:none;"></select>
      </div>
      <div class="field">
        <label>Rear sprocket</label>
        <div><input type="number" id="rearSprocket" placeholder="82"> <span class="unit">teeth</span></div>
      </div>
    </div>

    <!-- Carb needles -->
    <div class="field-row">
      <div class="field">
        <label><strong>Low</strong>-speed needle</label>
        <div><input type="number" step="0.125" id="needleLow" placeholder="1.0"> <span class="unit">turns</span></div>
      </div>
      <div class="field">
        <label><strong>High</strong>-speed needle</label>
        <div><input type="number" step="0.125" id="needleHigh" placeholder="1.25"> <span class="unit">turns</span></div>
      </div>
    </div>

    <!-- Notes -->
    <textarea class="notes-field" id="stintNotes" placeholder="Session notes... (setup changes, how the kart felt, observations)"></textarea>

    <!-- Advanced -->
    <div class="advanced-toggle" onclick="toggleAdvanced()">
      <span id="advLabel">Show advanced setup (12 fields)</span>
    </div>
    <div class="advanced-section" id="advancedSection">
      <div class="field-row">
        <div class="field"><label>Front sprocket</label><input type="number" id="frontSprocket" placeholder="10"></div>
        <div class="field"><label>Axle type</label><input type="text" id="axleType" placeholder="Medium" style="font-size:16px;"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Front ride height</label><input type="number" id="frontRideHeight" placeholder="mm"></div>
        <div class="field"><label>Rear ride height</label><input type="number" id="rearRideHeight" placeholder="mm"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Camber FL</label><input type="number" step="0.1" id="camberFL" placeholder="°"></div>
        <div class="field"><label>Camber FR</label><input type="number" step="0.1" id="camberFR" placeholder="°"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Caster L</label><input type="number" step="0.1" id="casterL" placeholder="°"></div>
        <div class="field"><label>Caster R</label><input type="number" step="0.1" id="casterR" placeholder="°"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Toe front</label><input type="number" step="0.5" id="toeFront" placeholder="mm"></div>
        <div class="field"><label>Rear bumper</label>
          <select id="rearBumper" style="width:100%;border:none;font-size:16px;font-weight:600;font-family:inherit;background:transparent;outline:none;">
            <option value="">—</option><option>Loose</option><option>Tight</option><option>Removed</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Seat position</label><input type="text" id="seatPosition" placeholder="struts" style="font-size:16px;"></div>
        <div class="field"><label>Total weight</label><input type="number" step="0.1" id="totalWeight" placeholder="kg"></div>
      </div>
    </div>

    <button class="btn-primary" onclick="saveStint()">Save stint</button>
  </div>

  <!-- TIRES SCREEN -->
  <div class="screen" id="screen-tires">
    <div class="section-label">Tire sets</div>
    <div id="tireList"></div>
    <button class="btn-secondary" onclick="showAddTire()">+ Add tire set</button>
    <div id="addTireForm" style="display:none;margin-top:12px;">
      <div class="field-row">
        <div class="field"><label>Set #</label><input type="number" id="newTireNum" placeholder="5"></div>
        <div class="field"><label>Brand</label><input type="text" id="newTireBrand" placeholder="MG" style="font-size:16px;"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Compound</label><input type="text" id="newTireCompound" placeholder="SM Yellow" style="font-size:16px;"></div>
        <div class="field"><label>Condition</label>
          <select id="newTireCondition" style="width:100%;border:none;font-size:16px;font-weight:600;font-family:inherit;background:transparent;outline:none;">
            <option>new</option><option>good</option><option>past peak</option><option>done</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" onclick="addTireSet()" style="margin-top:8px;">Save tire set</button>
    </div>
  </div>

  <!-- HISTORY SCREEN -->
  <div class="screen" id="screen-history">
    <div class="section-label">Today's stints</div>
    <div id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURATION - Replace with your Supabase credentials
// ============================================================
const SUPABASE_URL = 'https://mbdosilxitruwzkwdxzw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ZWg4ix5Cd1PLurWoFPsDXQ_QdsNfG4t';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let state = {
  kart: null,
  track: null,
  session: null,
  stintNumber: 1,
  tireSets: [],
  selectedTireSet: null,
  todayStints: [],
  lastSetup: null, // pre-fill from previous stint
};

// PSI to bar conversion (store as bar in DB)
const PSI_TO_BAR = 0.0689476;
const BAR_TO_PSI = 14.5038;

function psiToBar(psi) { return psi ? psi * PSI_TO_BAR : null; }
function barToPsi(bar) { return bar ? (bar * BAR_TO_PSI).toFixed(1) : ''; }

// ============================================================
// INIT
// ============================================================
async function init() {
  try {
    // Load kart
    const { data: karts } = await sb.from('karts').select('*').limit(1);
    if (karts && karts.length) state.kart = karts[0];

    // Load track
    const { data: tracks } = await sb.from('tracks').select('*').limit(1);
    if (tracks && tracks.length) state.track = tracks[0];

    // Load tire sets
    await loadTireSets();

    // Get or create today's session
    await getOrCreateSession();

    // Load today's stints
    await loadTodayStints();

    // Pre-fill from last stint
    await prefillFromLastStint();

    updateUI();
    document.getElementById('headerSub').textContent =
      `${state.kart?.name || 'No kart'} · ${state.track?.name || 'No track'} · ${new Date().toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'})}`;
    document.getElementById('pillTrack').textContent = state.track?.name || 'No track';
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('headerSub').textContent = 'Connection error - check Supabase config';
  }
}

async function getOrCreateSession() {
  const today = new Date().toISOString().split('T')[0];
  const { data: existing } = await sb.from('sessions').select('*')
    .eq('kart_id', state.kart.id)
    .eq('track_id', state.track.id)
    .eq('session_date', today)
    .limit(1);

  if (existing && existing.length) {
    state.session = existing[0];
  } else {
    const { data: created } = await sb.from('sessions').insert({
      kart_id: state.kart.id,
      track_id: state.track.id,
      session_date: today,
      session_type: 'Practice',
    }).select().single();
    state.session = created;
  }
}

async function loadTireSets() {
  const { data } = await sb.from('tire_sets').select('*')
    .eq('kart_id', state.kart.id)
    .order('set_number');
  state.tireSets = data || [];
  updateTireSelect();
  renderTireList();
}

async function loadTodayStints() {
  if (!state.session) return;
  const { data } = await sb.from('stints').select(`
    *, setup_snapshots(*), tire_sets(set_number, brand, compound)
  `).eq('session_id', state.session.id).order('stint_number');
  state.todayStints = data || [];
  state.stintNumber = state.todayStints.length + 1;
  document.getElementById('stintNum').textContent = state.stintNumber;
  renderHistory();
}

async function prefillFromLastStint() {
  // Try last stint from today, or last stint from any session
  let setup = null;
  if (state.todayStints.length > 0) {
    const lastStint = state.todayStints[state.todayStints.length - 1];
    if (lastStint.setup_snapshots && lastStint.setup_snapshots.length) {
      setup = lastStint.setup_snapshots[0];
    }
  }
  if (!setup) {
    const { data } = await sb.from('setup_snapshots').select('*').order('created_at', { ascending: false }).limit(1);
    if (data && data.length) setup = data[0];
  }
  if (setup) {
    state.lastSetup = setup;
    document.getElementById('frontTrack').value = setup.front_track_mm || '';
    document.getElementById('rearTrack').value = setup.rear_track_mm || '';
    document.getElementById('rearSprocket').value = setup.rear_sprocket || '';
    document.getElementById('cp_fl').value = barToPsi(setup.cold_pres_fl_bar);
    document.getElementById('cp_fr').value = barToPsi(setup.cold_pres_fr_bar);
    document.getElementById('cp_rl').value = barToPsi(setup.cold_pres_rl_bar);
    document.getElementById('cp_rr').value = barToPsi(setup.cold_pres_rr_bar);
    // Don't pre-fill hot pressures (those are per-stint)
    document.getElementById('needleLow').value = setup.needle_low_turns || '';
    document.getElementById('needleHigh').value = setup.needle_high_turns || '';
    // Advanced
    document.getElementById('frontSprocket').value = setup.front_sprocket || '';
    document.getElementById('axleType').value = setup.axle_type || '';
    document.getElementById('frontRideHeight').value = setup.front_ride_height_mm || '';
    document.getElementById('rearRideHeight').value = setup.rear_ride_height_mm || '';
    document.getElementById('camberFL').value = setup.camber_fl_deg || '';
    document.getElementById('camberFR').value = setup.camber_fr_deg || '';
    document.getElementById('casterL').value = setup.caster_l_deg || '';
    document.getElementById('casterR').value = setup.caster_r_deg || '';
    document.getElementById('toeFront').value = setup.toe_front_mm || '';
    document.getElementById('rearBumper').value = setup.rear_bumper || '';
    document.getElementById('seatPosition').value = setup.seat_position || '';
    document.getElementById('totalWeight').value = setup.total_weight_kg || '';
  }
}

// ============================================================
// SAVE STINT
// ============================================================
async function saveStint() {
  if (!state.session) { toast('Error: no session'); return; }

  try {
    // Create stint
    const { data: stint, error: stintErr } = await sb.from('stints').insert({
      session_id: state.session.id,
      stint_number: state.stintNumber,
      track_condition: document.getElementById('trackCondition').value,
      surface_condition: 'Dry',
      tire_set_id: state.selectedTireSet,
      notes_text: document.getElementById('stintNotes').value || null,
    }).select().single();

    if (stintErr) throw stintErr;

    // Create setup snapshot
    const { error: setupErr } = await sb.from('setup_snapshots').insert({
      stint_id: stint.id,
      front_track_mm: intVal('frontTrack'),
      rear_track_mm: intVal('rearTrack'),
      rear_sprocket: intVal('rearSprocket'),
      front_sprocket: intVal('frontSprocket'),
      cold_pres_fl_bar: psiToBar(floatVal('cp_fl')),
      cold_pres_fr_bar: psiToBar(floatVal('cp_fr')),
      cold_pres_rl_bar: psiToBar(floatVal('cp_rl')),
      cold_pres_rr_bar: psiToBar(floatVal('cp_rr')),
      hot_pres_fl_bar: psiToBar(floatVal('hp_fl')),
      hot_pres_fr_bar: psiToBar(floatVal('hp_fr')),
      hot_pres_rl_bar: psiToBar(floatVal('hp_rl')),
      hot_pres_rr_bar: psiToBar(floatVal('hp_rr')),
      needle_low_turns: floatVal('needleLow'),
      needle_high_turns: floatVal('needleHigh'),
      front_ride_height_mm: intVal('frontRideHeight'),
      rear_ride_height_mm: intVal('rearRideHeight'),
      seat_position: strVal('seatPosition'),
      axle_type: strVal('axleType'),
      rear_bumper: strVal('rearBumper'),
      camber_fl_deg: floatVal('camberFL'),
      camber_fr_deg: floatVal('camberFR'),
      caster_l_deg: floatVal('casterL'),
      caster_r_deg: floatVal('casterR'),
      toe_front_mm: floatVal('toeFront'),
      total_weight_kg: floatVal('totalWeight'),
    });

    if (setupErr) throw setupErr;

    // Fetch weather in background
    fetchWeather(stint.id);

    // Clear hot pressures and notes for next stint
    ['hp_fl','hp_fr','hp_rl','hp_rr'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('stintNotes').value = '';

    // Increment stint
    state.stintNumber++;
    document.getElementById('stintNum').textContent = state.stintNumber;

    // Reload history
    await loadTodayStints();

    toast('Stint ' + (state.stintNumber - 1) + ' saved!');
  } catch (e) {
    console.error('Save error:', e);
    toast('Error saving: ' + e.message);
  }
}

// ============================================================
// WEATHER (auto-fetch from Open-Meteo)
// ============================================================
async function fetchWeather(stintId) {
  if (!state.track?.latitude || !state.track?.longitude) return;
  try {
    const lat = state.track.latitude;
    const lon = state.track.longitude;
    const resp = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m,wind_direction_10m,precipitation`
    );
    const wx = await resp.json();
    const c = wx.current;
    const temp = c.temperature_2m;
    const hum = c.relative_humidity_2m;
    const pres = c.surface_pressure;

    // Compute air density: rho = P / (R_specific * T_kelvin)
    const tempK = temp + 273.15;
    const airDensity = (pres * 100) / (287.05 * tempK);

    await sb.from('weather').insert({
      stint_id: stintId,
      temp_c: temp,
      humidity_pct: hum,
      pressure_hpa: pres,
      wind_speed_kmh: c.wind_speed_10m,
      wind_direction_deg: c.wind_direction_10m,
      air_density: Math.round(airDensity * 1000) / 1000,
      precip_last_24h_mm: c.precipitation,
    });
  } catch (e) {
    console.error('Weather fetch error:', e);
  }
}

// ============================================================
// TIRE SETS
// ============================================================
function renderTireList() {
  const el = document.getElementById('tireList');
  if (!state.tireSets.length) {
    el.innerHTML = '<div class="empty"><h3>No tire sets</h3><p>Add your first tire set below</p></div>';
    return;
  }
  el.innerHTML = state.tireSets.map(t => `
    <div class="tire-card ${state.selectedTireSet === t.id ? 'selected' : ''}" onclick="selectTire('${t.id}')">
      <div class="tire-info">
        <h3>#${t.set_number} — ${t.brand || ''} ${t.compound || ''}</h3>
        <p><span class="badge ${t.condition === 'new' ? 'new' : t.condition === 'good' ? 'good' : t.condition === 'past peak' ? 'past' : 'done'}">${t.condition}</span> · First used: ${t.first_used || 'never'}</p>
      </div>
      <div class="tire-laps">
        <div class="num">${t.cumulative_laps}</div>
        <div class="label">laps</div>
      </div>
    </div>
  `).join('');
}

function selectTire(id) {
  state.selectedTireSet = id;
  renderTireList();
  updateTireSelect();
}

function updateTireSelect() {
  const sel = document.getElementById('tireSetSelect');
  sel.innerHTML = '<option value="">—</option>' +
    state.tireSets.map(t =>
      `<option value="${t.id}" ${state.selectedTireSet === t.id ? 'selected' : ''}>#${t.set_number} ${t.brand || ''} · ${t.cumulative_laps}laps</option>`
    ).join('');
  sel.onchange = function() { state.selectedTireSet = this.value || null; renderTireList(); };
}

function showAddTire() {
  const form = document.getElementById('addTireForm');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
  if (form.style.display === 'block') {
    const nextNum = state.tireSets.length ? Math.max(...state.tireSets.map(t => t.set_number)) + 1 : 1;
    document.getElementById('newTireNum').value = nextNum;
  }
}

async function addTireSet() {
  const { error } = await sb.from('tire_sets').insert({
    kart_id: state.kart.id,
    set_number: parseInt(document.getElementById('newTireNum').value),
    brand: document.getElementById('newTireBrand').value || null,
    compound: document.getElementById('newTireCompound').value || null,
    condition: document.getElementById('newTireCondition').value,
    cumulative_laps: 0,
    first_used: new Date().toISOString().split('T')[0],
  });
  if (error) { toast('Error: ' + error.message); return; }
  document.getElementById('addTireForm').style.display = 'none';
  await loadTireSets();
  toast('Tire set added!');
}

// ============================================================
// HISTORY
// ============================================================
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!state.todayStints.length) {
    el.innerHTML = '<div class="empty"><h3>No stints yet</h3><p>Save your first stint to see it here</p></div>';
    return;
  }
  el.innerHTML = state.todayStints.map(s => {
    const setup = s.setup_snapshots?.[0];
    const tire = s.tire_sets;
    const parts = [];
    if (setup?.rear_sprocket) parts.push(`Sprocket: ${setup.rear_sprocket}t`);
    if (setup?.rear_track_mm) parts.push(`Rear: ${setup.rear_track_mm}mm`);
    if (tire) parts.push(`Tires: #${tire.set_number}`);
    if (setup?.cold_pres_fl_bar) parts.push(`Cold FL: ${barToPsi(setup.cold_pres_fl_bar)} PSI`);
    return `
      <div class="stint-card">
        <h3>Stint ${s.stint_number} · ${s.track_condition || 'Normal'}</h3>
        <p>${parts.join(' · ')}</p>
        ${s.notes_text ? `<p style="margin-top:4px;font-style:italic;font-size:12px;color:var(--text3);">"${s.notes_text}"</p>` : ''}
      </div>
    `;
  }).join('');
}

// ============================================================
// UI HELPERS
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (name === 'history') loadTodayStints();
}

function toggleAdvanced() {
  const sec = document.getElementById('advancedSection');
  const open = sec.classList.toggle('open');
  document.getElementById('advLabel').textContent = open ? 'Hide advanced setup' : 'Show advanced setup (12 fields)';
}

function incrementStint() {
  state.stintNumber++;
  document.getElementById('stintNum').textContent = state.stintNumber;
  // Clear hot pressures and notes
  ['hp_fl','hp_fr','hp_rl','hp_rr'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('stintNotes').value = '';
  toast('Ready for stint ' + state.stintNumber);
}

function updateSessionType() {
  if (state.session) {
    sb.from('sessions').update({ session_type: document.getElementById('sessionType').value })
      .eq('id', state.session.id);
  }
}

function updateUI() {
  renderTireList();
  updateTireSelect();
  renderHistory();
}

function intVal(id) { const v = document.getElementById(id).value; return v ? parseInt(v) : null; }
function floatVal(id) { const v = document.getElementById(id).value; return v ? parseFloat(v) : null; }
function strVal(id) { const v = document.getElementById(id).value; return v || null; }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ============================================================
// BOOT
// ============================================================
init();
</script>
</body>
</html>
